<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gmail Filter Editor</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <header>
    <h1>Gmail Filter Editor</h1>
    <form id="auth-form" class="auth-form">
      <input id="auth-token" type="text" autocomplete="off" placeholder="OAuth token">
      <button id="save-token" type="submit">Update token</button>
      <a class="auth-link" href="https://developers.google.com/oauthplayground/" target="_blank" rel="noopener noreferrer">OAuth Playground</a>
      <span id="auth-status" class="auth-status"></span>
    </form>
    <div class="toolbar">
      <button id="filters-tab" class="tab active" type="button">Filters</button>
      <button id="labels-tab" class="tab" type="button">Labels</button>
      <input id="search" type="search" placeholder="Search">
      <button id="reload" type="button">Reload</button>
      <span id="count" class="count"></span>
    </div>
  </header>
  <main>
    <section id="filters-panel">
      <div class="filter-chips">
        <button class="chip active" data-filter-chip="all" type="button">All</button>
        <button class="chip" data-filter-chip="skip-inbox" type="button">Skip inbox</button>
        <button class="chip" data-filter-chip="has-label" type="button">Has label</button>
        <button class="chip" data-filter-chip="no-label" type="button">No label</button>
        <button class="chip" data-filter-chip="raw-query" type="button">Raw query</button>
      </div>
      <table id="filters-table">
        <thead>
          <tr>
            <th style="width: 24%"><button class="sort-button" data-sort-key="id" type="button">ID</button></th>
            <th style="width: 34%"><button class="sort-button" data-sort-key="criteria" type="button">Criteria</button></th>
            <th style="width: 22%"><button class="sort-button" data-sort-key="label" type="button">Label</button></th>
            <th style="width: 20%"><button class="sort-button" data-sort-key="action" type="button">Action</button></th>
          </tr>
        </thead>
        <tbody id="filter-rows"></tbody>
      </table>
      <div id="filter-message" class="empty"></div>
    </section>
    <section id="labels-panel" class="hidden">
      <table id="labels-table">
        <thead>
          <tr>
            <th style="width: 34%">Name</th>
            <th style="width: 24%">ID</th>
            <th style="width: 18%">Type</th>
            <th style="width: 24%">Visibility</th>
          </tr>
        </thead>
        <tbody id="label-rows"></tbody>
      </table>
      <div id="label-message" class="empty"></div>
    </section>
    <section class="details">
      <h2 id="details-title">JSON</h2>
      <form id="filter-form" class="editor-form">
        <div class="mode-toggle">
          <button id="basic-filter-mode" class="tab active" type="button">Basic</button>
          <button id="raw-filter-mode" class="tab" type="button">JSON</button>
        </div>
        <div id="basic-filter-editor" class="basic-filter-editor">
          <label class="field-block">
            <span>Criteria</span>
            <textarea id="filter-query" spellcheck="false" placeholder="and:&#10;- from: example.com&#10;- subject: receipt"></textarea>
          </label>
          <div id="criteria-status" class="validation-status"></div>
          <div class="rendered-query">
            <span>Rendered Gmail query</span>
            <code id="rendered-query"></code>
          </div>
          <label class="field-block">
            <span>Apply label</span>
            <div id="filter-label-select" class="custom-select">
              <button id="filter-label-trigger" class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="filter-label-summary">No labels selected</span>
              </button>
              <div id="filter-label-options" class="custom-select-options hidden" role="listbox" aria-multiselectable="true"></div>
            </div>
          </label>
          <label class="check-row">
            <input id="filter-skip-inbox" type="checkbox">
            <span>Skip inbox</span>
          </label>
          <div id="action-status" class="validation-status"></div>
        </div>
        <textarea id="filter-json" class="hidden" spellcheck="false"></textarea>
        <div id="json-status" class="validation-status hidden"></div>
        <div class="form-actions">
          <button id="new-filter" type="button">New</button>
          <button id="save-filter" type="submit">Save</button>
          <button id="discard-filter" type="button">Discard changes</button>
          <button id="delete-filter" class="danger" type="button">Delete</button>
          <button id="undo-filter" type="button">Undo</button>
        </div>
      </form>
      <form id="label-form" class="label-form hidden">
        <input id="label-name" type="text" placeholder="Label name">
        <select id="label-list-visibility">
          <option value="">Label list</option>
          <option value="labelShow">Show</option>
          <option value="labelShowIfUnread">Show if unread</option>
          <option value="labelHide">Hide</option>
        </select>
        <select id="message-list-visibility">
          <option value="">Message list</option>
          <option value="show">Show</option>
          <option value="hide">Hide</option>
        </select>
        <input id="label-bg" type="text" placeholder="#background">
        <input id="label-fg" type="text" placeholder="#text">
        <div class="form-actions">
          <button id="new-label" type="button">New</button>
          <button id="save-label" type="submit">Save</button>
          <button id="delete-label" class="danger" type="button">Delete</button>
        </div>
      </form>
      <pre id="details">{}</pre>
    </section>
  </main>
  <div id="busy-overlay" class="busy-overlay hidden" role="status" aria-live="polite" aria-busy="true">
    <div class="busy-panel">
      <div class="spinner"></div>
      <div>
        <div id="busy-title" class="busy-title">Working</div>
        <div id="busy-detail" class="busy-detail"></div>
      </div>
    </div>
  </div>
</body>
</html>
