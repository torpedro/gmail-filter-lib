<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gmail filters</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <header>
    <h1>Gmail filters</h1>
    <form id="auth-form" class="auth-form">
      <input id="auth-token" type="text" autocomplete="off" placeholder="OAuth token">
      <button id="save-token" type="submit">Update token</button>
    </form>
    <div class="toolbar">
      <button id="filters-tab" class="tab active" type="button">Filters</button>
      <button id="labels-tab" class="tab" type="button">Labels</button>
      <input id="search" type="search" placeholder="Search">
      <button id="reload" type="button">Reload</button>
      <span id="count" class="count"></span>
    </div>
  </header>
  <main>
    <section id="filters-panel">
      <table id="filters-table">
        <thead>
          <tr>
            <th style="width: 28%">ID</th>
            <th style="width: 42%">Criteria</th>
            <th style="width: 30%">Action</th>
          </tr>
        </thead>
        <tbody id="filter-rows"></tbody>
      </table>
      <div id="filter-message" class="empty"></div>
    </section>
    <section id="labels-panel" class="hidden">
      <table id="labels-table">
        <thead>
          <tr>
            <th style="width: 34%">Name</th>
            <th style="width: 24%">ID</th>
            <th style="width: 18%">Type</th>
            <th style="width: 24%">Visibility</th>
          </tr>
        </thead>
        <tbody id="label-rows"></tbody>
      </table>
      <div id="label-message" class="empty"></div>
    </section>
    <section class="details">
      <h2 id="details-title">JSON</h2>
      <form id="filter-form" class="editor-form">
        <div class="mode-toggle">
          <button id="basic-filter-mode" class="tab active" type="button">Basic</button>
          <button id="raw-filter-mode" class="tab" type="button">JSON</button>
        </div>
        <div id="basic-filter-editor" class="basic-filter-editor">
          <label class="field-block">
            <span>Criteria</span>
            <textarea id="filter-query" spellcheck="false" placeholder="and:&#10;- from: example.com&#10;- subject: receipt"></textarea>
          </label>
          <label class="field-block">
            <span>Apply label</span>
            <select id="filter-label"></select>
          </label>
          <label class="check-row">
            <input id="filter-skip-inbox" type="checkbox">
            <span>Skip inbox</span>
          </label>
        </div>
        <textarea id="filter-json" class="hidden" spellcheck="false"></textarea>
        <div class="form-actions">
          <button id="new-filter" type="button">New</button>
          <button id="save-filter" type="submit">Save</button>
          <button id="delete-filter" class="danger" type="button">Delete</button>
        </div>
      </form>
      <form id="label-form" class="label-form hidden">
        <input id="label-name" type="text" placeholder="Label name">
        <select id="label-list-visibility">
          <option value="">Label list</option>
          <option value="labelShow">Show</option>
          <option value="labelShowIfUnread">Show if unread</option>
          <option value="labelHide">Hide</option>
        </select>
        <select id="message-list-visibility">
          <option value="">Message list</option>
          <option value="show">Show</option>
          <option value="hide">Hide</option>
        </select>
        <input id="label-bg" type="text" placeholder="#background">
        <input id="label-fg" type="text" placeholder="#text">
        <div class="form-actions">
          <button id="new-label" type="button">New</button>
          <button id="save-label" type="submit">Save</button>
          <button id="delete-label" class="danger" type="button">Delete</button>
        </div>
      </form>
      <pre id="details">{}</pre>
    </section>
  </main>
  <div id="busy-overlay" class="busy-overlay hidden" role="status" aria-live="polite" aria-busy="true">
    <div class="busy-panel">
      <div class="spinner"></div>
      <div>
        <div id="busy-title" class="busy-title">Working</div>
        <div id="busy-detail" class="busy-detail"></div>
      </div>
    </div>
  </div>
</body>
</html>
